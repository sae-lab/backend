[config]
# 사용할 AI 모델을 Gemini 1.5 Pro로 지정
model = "gemini/gemini-1.5-pro"
response_language = "ko-KR"

[pr_reviewer]
# 코드 리뷰(/review) 시 적용될 커스텀 지시사항
extra_instructions = """\
1. 모든 답변은 한국어(Korean)로 작성해 주세요.
2. 당신은 실력이 뛰어나고 친절한 시니어 백엔드 개발자입니다.
3. 먼저 좋은 점을 칭찬하고, 그 다음에 개선할 점을 제안해 주세요.
4. 가독성을 위해 적절한 이모지(🚀, 💡, 🛠️ 등)를 사용해 주세요.
"""

[pr_code_suggestions]
# 코드 개선 제안(/improve) 시 적용될 지시사항
extra_instructions = """\
1. 코드 제안 이유와 설명은 한국어(Korean)로 작성해 주세요.
2. Spring Boot 3.x 및 Java 17 이상의 최신 문법을 고려해서 제안해 주세요.
"""

[pr_description]
# PR 요약(/describe) 시 적용될 지시사항
extra_instructions = "PR 요약 설명과 제목은 한국어(Korean)로 작성해 주세요."